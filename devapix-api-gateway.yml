spring:
  messages:
    basename: error-messages
  cloud:
    gateway:
      routes:
        - id: auth-service-docs
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/v3/api-docs/auth-service
          filters:
            - RewritePath=/v3/api-docs/auth-service, /v3/api-docs
        - id: api-catalog-service-docs
          uri: lb://API-CATALOG-SERVICE
          predicates:
            - Path=/v3/api-docs/api-catalog-service
          filters:
            - RewritePath=/v3/api-docs/api-catalog-service, /api-catalog/v3/api-docs
        - id: api-catalog-internal
          uri: lb://API-CATALOG-SERVICE
          predicates:
            - Path=/api-catalog/internal/**
          filters:
            - StripPrefix=1
        - id: api-subscription-service-docs
          uri: lb://API-SUBSCRIPTION-SERVICE
          predicates:
            - Path=/v3/api-docs/api-subscription-service
          filters:
            - RewritePath=/v3/api-docs/api-subscription-service, /v3/api-docs
        - id: sandbox-service-docs
          uri: lb://SANDBOX-SERVICE
          predicates:
            - Path=/v3/api-docs/sandbox-service
          filters:
            - RewritePath=/v3/api-docs/sandbox-service, /sandbox/v3/api-docs
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - AuthenticationFilter
        - id: api-catalog-service
          uri: lb://API-CATALOG-SERVICE
          predicates:
            - Path=/api-catalog/**
          filters:
            - AuthenticationFilter
        - id: api-subscription-service
          uri: lb://API-SUBSCRIPTION-SERVICE
          predicates:
            - Path=/subscriptions/**
          filters:
            - AuthenticationFilter
        - id: sandbox-service
          uri: lb://SANDBOX-SERVICE
          predicates:
            - Path=/sandbox/**
          filters:
            - AuthenticationFilter

jwt:
  secret: ${JWT_SECRET}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /v3/api-docs/auth-service
      - name: API Catalog Service
        url: /v3/api-docs/api-catalog-service
      - name: API Subscription Service
        url: /v3/api-docs/api-subscription-service
      - name: Sandbox Service
        url: /v3/api-docs/sandbox-service
